<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Finance - Safe & Smart Wealth Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="auth-container">
        <section id="registerCard" class="auth-card">
            <header class="auth-header">
                <h1 id="txt-title">Konto erstellen</h1>
                <p id="txt-subtitle">Starten Sie Ihre finanzielle Unabhängigkeit</p>
            </header>
            
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <input type="text" id="username" placeholder=" " required autocomplete="username">
                    <label for="username" id="lbl-username">Benutzername</label>
                </div>
                
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required autocomplete="email">
                    <label for="email" id="lbl-email">E-Mail-Adresse</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder=" " required autocomplete="new-password">
                    <label for="password" id="lbl-password">Sicheres Passwort</label>
                </div>
                
                <div class="password-policies">
                    <div id="req-length" class="policy-item invalid">
                        <span class="icon">○</span> <span id="policy-len">Mindestens 8 Zeichen</span>
                    </div>
                    <div id="req-num" class="policy-item invalid">
                        <span class="icon">○</span> <span id="policy-num">Mindestens 1 Zahl</span>
                    </div>
                    <div id="req-spec" class="policy-item invalid">
                        <span class="icon">○</span> <span id="policy-spec">Mindestens 1 Sonderzeichen</span>
                    </div>
                </div>

                <button type="submit" id="btn-register" class="btn-primary">Registrieren</button>
            </form>
        </section>

        <section id="verifyCard" class="auth-card hidden">
            <header class="auth-header">
                <h1 id="txt-verify-title">E-Mail bestätigen</h1>
                <p id="txt-verify-desc">Wir haben einen Sicherheitscode an Ihre E-Mail-Adresse gesendet.</p>
                <small class="demo-badge">Demo-Code: 123456</small>
            </header>
            
            <form id="verifyForm" onsubmit="handleVerify(event)">
                <div class="input-group">
                    <input type="text" id="verifyCode" placeholder=" " maxlength="6" required autocomplete="off">
                    <label for="verifyCode" id="lbl-code">6-stelliger Code</label>
                </div>
                
                <button type="submit" id="btn-verify" class="btn-primary">Code verifizieren</button>
                <div id="verifyStatus" class="status-message"></div>
            </form>
        </section>
    </main>

    <nav class="language-wrapper" aria-label="Language Selector">
        <select id="langSelect" onchange="changeLanguage()">
            <option value="de">Deutsch</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="it">Italiano</option>
            <option value="fr">Français</option>
            <option value="gr">Ελληνικά</option>
        </select>
    </nav>

    <script src="script.js"></script>
</body>
</html>
