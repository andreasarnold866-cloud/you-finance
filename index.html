<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Finance — Next-Gen Wealth Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-background">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <main class="auth-viewport">
        
        <article id="registerCard" class="surface-card">
            <header class="brand-identity">
                <svg class="brand-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="1" x2="12" y2="23"></line>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                <span class="brand-text">You Finance</span>
            </header>
            
            <section class="section-header">
                <h1 id="txt-title">Konto erstellen</h1>
                <p id="txt-subtitle">Sichern Sie sich den Zugang zu Ihren Finanzen.</p>
            </section>
            
            <form id="registerForm" onsubmit="App.Security.executeRegister(event)" novalidate>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder=" " required autocomplete="username">
                    <label id="lbl-username">Benutzername</label>
                </div>
                
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder=" " required autocomplete="email">
                    <label id="lbl-email">E-Mail-Adresse</label>
                </div>
                
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder=" " required autocomplete="new-password">
                    <label id="lbl-password">Sicheres Passwort</label>
                </div>
                
                <div class="security-matrix">
                    <div class="matrix-meter">
                        <div id="strengthBar" class="matrix-bar"></div>
                    </div>
                    <ul class="matrix-policies">
                        <li id="req-length" class="policy-node invalid">
                            <span class="node-bullet"></span>
                            <span id="policy-len">Mindestens 8 Zeichen</span>
                        </li>
                        <li id="req-num" class="policy-node invalid">
                            <span class="node-bullet"></span>
                            <span id="policy-num">Mindestens 1 Zahl</span>
                        </li>
                        <li id="req-spec" class="policy-node invalid">
                            <span class="node-bullet"></span>
                            <span id="policy-spec">Mindestens 1 Sonderzeichen</span>
                        </li>
                    </ul>
                </div>

                <button type="submit" id="btn-register" class="cta-trigger">Registrieren</button>
            </form>
        </article>

        <article id="verifyCard" class="surface-card hidden">
            <header class="section-header">
                <div class="status-icon-container">
                    <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <h1 id="txt-verify-title">E-Mail bestätigen</h1>
                <p id="txt-verify-desc">Wir haben einen Sicherheitscode an Ihre E-Mail gesendet.</p>
                <div class="sandbox-badge">Demo-Code: 123456</div>
            </header>
            
            <form id="verifyForm" onsubmit="App.Security.executeVerify(event)">
                <div class="input-wrapper">
                    <input type="text" id="verifyCode" placeholder=" " maxlength="6" required autocomplete="off" class="secure-code-input">
                    <label id="lbl-code">6-stelliger Code</label>
                </div>
                
                <button type="submit" id="btn-verify" class="cta-trigger">Code verifizieren</button>
                <div id="verifyStatus" class="feedback-anchor"></div>
            </form>
        </article>
    </main>

    <nav class="localization-widget" aria-label="Language Selector">
        <svg class="localization-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <select id="langSelect" onchange="App.Localization.switchLanguage()">
            <option value="de">Deutsch</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="it">Italiano</option>
            <option value="fr">Français</option>
            <option value="gr">Ελληνικά</option>
        </select>
    </nav>

    <script src="script.js"></script>
</body>
</html>
